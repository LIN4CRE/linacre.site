name: Lighthouse

# Scores performance, accessibility, best-practices and SEO on every PR
# and fails if any drops below the budget. Keeps the site fast and clean.
on:
  pull_request:

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          staticDistDir: '.'
          configPath: './.github/lighthouserc.json'
          uploadArtifacts: true
