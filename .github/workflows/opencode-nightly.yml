name: opencode nightly (autonomous)

# Autonomous site-improvement agent. MANUAL by default (bill-safe): run it from the
# Actions tab when you want it. To make it automatic, uncomment the schedule below —
# it can still only spend what your prepaid credits allow (see COST-SAFETY.md).
on:
  workflow_dispatch: {}
  # schedule:
  #   - cron: "0 9 * * 1" # every Monday 09:00 UTC

concurrency:
  group: opencode-nightly
  cancel-in-progress: true

jobs:
  improve:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: anomalyco/opencode/github@latest
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: openai/gpt-5.2
          use_github_token: true
          prompt: |
            Audit index.html. If you find ONE concrete improvement
            (accessibility, performance, SEO, dead links, or broken markup),
            open a single focused PR with the fix and a clear description.
            Keep the zero-framework, single-file approach. If nothing needs
            fixing, do nothing. Never open more than one PR per run.
