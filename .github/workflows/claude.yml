name: Claude (AI teammate)

# Mention @claude in any issue or PR comment → it answers, writes code, opens a PR.
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]

# Cancel older runs so stacked events never burn extra quota.
concurrency:
  group: claude-${{ github.event.issue.number || github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  claude:
    if: contains(github.event.comment.body, '@claude') || contains(github.event.issue.body, '@claude')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@v1
        with:
          # Draws from your Claude Pro/Max subscription quota — NOT billed API credits.
          # Generate locally with: claude setup-token
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Hard cap on iterations keeps each run cheap.
          claude_args: "--max-turns 15"
