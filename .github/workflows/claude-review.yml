name: AI code review

on:
  pull_request:
    types: [opened, synchronize]

# One review per PR at a time; new pushes cancel the old run.
concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@v1
        with:
          # Subscription quota, not billed API credits. From: claude setup-token
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--max-turns 12"
          prompt: |
            Review this pull request. Focus on:
            - Bugs, broken links, and accessibility (WCAG AA) issues
            - Performance and SEO regressions
            - Anything that breaks the "zero frameworks, single file" approach
            Be concise. Post inline comments with the fix, and give a 1-line verdict:
            APPROVE, COMMENT, or REQUEST CHANGES.
