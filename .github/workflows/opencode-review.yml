name: opencode review (Gemini)

# Second opinion on every PR via your Gemini key (free tier — see COST-SAFETY.md).
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: opencode-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write
      issues: read
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: anomalyco/opencode/github@latest
        env:
          # opencode's Google provider reads GOOGLE_GENERATIVE_AI_API_KEY;
          # mapped from your GEMINI_API_KEY secret (use a free-tier, non-billed key).
          GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: google/gemini-3-pro-preview
          use_github_token: true
          prompt: |
            Review this PR using full repo context. Focus on: bugs, broken
            links, accessibility (WCAG AA), performance, and SEO. Keep the
            zero-framework single-file approach. Be concise; give concrete fixes.
