<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--ROUTE_HEAD-->
    <title>Linacre Start — Free browser tools that get things done</title>
    <meta name="description" content="A useful start page with private JSON, Base64, VAT, text, URL, SHA-256, timestamp and secure-value tools." />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <link rel="canonical" href="https://www.linacre.site/" />
    <!--/ROUTE_HEAD-->
    <meta name="author" content="David Christopher Linacre" />
    <meta name="theme-color" content="#030c14" />
    <meta name="color-scheme" content="dark light" />

    <!-- Preconnect / DNS-prefetch (audit Performance) -->
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://play.pokemonshowdown.com" crossorigin />
    <link rel="preconnect" href="https://raw.githubusercontent.com" crossorigin />

    <!-- Critical self-hosted fonts -->
    <link rel="preload" href="/fonts/inter-var-latin.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/space-grotesk-var-latin.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/jetbrains-mono-var-latin.woff2" as="font" type="font/woff2" crossorigin />

    <!-- Web App & PWA Support -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Icons -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <!-- Hreflang -->
    <link rel="alternate" hreflang="en-GB" href="https://www.linacre.site/" />
    <link rel="alternate" hreflang="x-default" href="https://www.linacre.site/" />

    <!-- RSS -->
    <link rel="alternate" type="application/rss+xml" title="Linacre engineering notes" href="https://www.linacre.site/feed.xml" />
  </head>
  <body>
    <div id="root"><!--ROUTE_CONTENT--></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
