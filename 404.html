<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — linacre.site</title>
<meta name="theme-color" content="#0b0e14">
<style>
  :root {
    --bg: #0b0e14; --amber: #ffb454; --cyan: #5ccfe6; --text: #e6e9ef;
    --muted: #8b93a7; --mono: ui-monospace, "SF Mono", monospace;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font-family: var(--mono); display: flex; align-items: center;
    justify-content: center; min-height: 100vh; padding: 24px;
    background-image: radial-gradient(60rem 40rem at 50% -10%, rgba(255,180,84,.06), transparent 60%);
  }
  .wrap { text-align: center; }
  .code { font-size: 4rem; font-weight: 700; color: var(--amber); margin: 0 0 8px; line-height: 1; }
  .msg { color: var(--muted); margin: 0 0 28px; font-size: 1rem; }
  a { color: var(--cyan); text-decoration: none; padding: 10px 20px; border: 1px solid rgba(92,207,230,.3); border-radius: 8px; display: inline-block; }
  a:hover { border-color: var(--cyan); }
</style>
</head>
<body>
<div class="wrap">
  <p class="code">404</p>
  <p class="msg">// page not found — the terminal has no record of this route</p>
  <a href="/">cd ~/linacre.site</a>
</div>
</body>
</html>
