name: Claude (AI teammate)

# Mention @claude in any issue or PR comment and it will answer,
# write code, open a branch, and push a PR — no local checkout needed.
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]

jobs:
  claude:
    # Only run when @claude is actually mentioned (saves tokens).
    if: contains(github.event.comment.body, '@claude') || contains(github.event.issue.body, '@claude')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Swap to Opus for the hardest problems (higher cost):
          # claude_args: "--model claude-opus-4-8"
