name: AI code review

# Every PR gets an automatic review before you merge.
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this pull request. Focus on:
            - Bugs, broken links, and accessibility (WCAG AA) issues
            - Performance and SEO regressions
            - Anything that breaks the "zero frameworks, single file" approach
            Be concise. Post inline comments with the fix, and give a 1-line verdict:
            APPROVE, COMMENT, or REQUEST CHANGES.
