version: 2
updates:
  # Keep GitHub Actions versions current.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels: ["dependencies"]

  # Keep npm packages current (harmless if you have no package.json yet).
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    labels: ["dependencies"]
    open-pull-requests-limit: 5
